<!DOCTYPE html>
<html lang="cs" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rádio Kombinátor</title>
    <style>
        :root { --bg:#121212; --card-bg:#1e1e1e; --accent:#ff3333; --text:#e0e0e0; }
        body { font-family:sans-serif; background:var(--bg); color:var(--text); margin:0; padding:10px; }
        .site-title { text-align:center; font-size:28px; font-weight:bold; margin:10px 0; color:white; }
        .shinto-box { border:1px solid var(--accent); padding:10px; border-radius:5px; text-align:center; margin-bottom:10px; background:#000; }
        .shinto-box h2 { margin:0 0 5px 0; font-size:18px; color:var(--accent); }
        nav { display:flex; flex-direction:column; gap:5px; margin-bottom:10px; }
        button { padding:8px; background:#333; color:white; border:none; cursor:pointer; border-radius:3px; font-weight:bold; }
        button:hover { background:var(--accent); }
        #playerArea { background:var(--card-bg); padding:10px; border-radius:5px; margin-bottom:10px; display:none; border-left:3px solid var(--accent); }
        #genresList { display:flex; flex-wrap:wrap; gap:3px; max-height:200px; overflow-y:auto; padding:5px; background:#000; border-radius:3px; margin-bottom:10px; }
        #radioList { list-style:none; padding:0; display:grid; grid-template-columns:1fr; gap:5px; }
        .station-item { background:var(--card-bg); padding:8px; border-radius:3px; font-size:14px; }
    </style>
</head>

<body>
    <div class="site-title">📻 RADIKOMBINATOR</div>

    <div class="shinto-box">
        <h2>📻 Rádio Shinto</h2>
        <div style="max-width:300px;margin:0 auto;">
            <script src="//myradiostream.com/embed/Popik666"></script>
        </div>
        <p style="margin:5px 0 0 0;">
            <a href="https://popik666.on-air.fm" target="_blank" style="color:#ff3333; font-size:12px; text-decoration:none;">🔗 Právě hraje</a>
        </p>
    </div>

    <nav>
        <button onclick="F_loadCZ()">🇨🇿 Česká Rádia</button>
        <button onclick="F_indexWorld()">🌍 Indexovat Svět (TOP 5000)</button>
    </nav>

    <div id="playerArea">
        <div id="playerLabel" style="margin-bottom:5px; font-size:12px;">Hraje: Nic</div>
        <audio id="audioPlayer" controls autoplay style="width:100%; height:30px;"></audio>
    </div>

    <div id="genresList"></div>
    <ul id="radioList"></ul>

    <script>
        const API = "https://de1.api.radio-browser.info/json";
        const CACHE = { byGenre: {} };
        const C_LIST = document.getElementById('radioList');
        const C_AUDIO = document.getElementById('audioPlayer');

        async function F_loadCZ() {
            C_LIST.innerHTML = "<li>Načítám...</li>";
            const res = await fetch(`${API}/stations/bycountrycodeexact/CZ`);
            const data = await res.json();
            F_render(data.filter(s => !s.name.toLowerCase().includes("abdul")).slice(0, 50));
        }

        async function F_indexWorld() {
            C_LIST.innerHTML = "<li>⏳ Indexuji 5000 stanic...</li>";
            const res = await fetch(`${API}/stations/topclick/5000`);
            const data = await res.json();
            CACHE.byGenre = {};
            data.forEach(s => {
                if(s.tags) s.tags.split(',').forEach(t => {
                    let g = t.trim().toLowerCase();
                    if(!CACHE.byGenre[g]) CACHE.byGenre[g] = [];
                    CACHE.byGenre[g].push(s);
                });
            });
            const top200 = Object.keys(CACHE.byGenre).sort((a,b) => CACHE.byGenre[b].length - CACHE.byGenre[a].length).slice(0, 200);
            document.getElementById('genresList').innerHTML = top200.map(g => `<button onclick="F_filter('${g}')">${g}</button>`).join('');
            C_LIST.innerHTML = "<li>✅ Vyberte žánr.</li>";
        }

        function F_filter(genre) { F_render(CACHE.byGenre[genre].slice(0, 50)); }

        function F_render(data) {
            C_LIST.innerHTML = data.map(s => `
                <li class="station-item">
                    ${s.name} <button style="float:right; padding:2px 8px;" onclick="F_play('${s.url_resolved || s.url}', '${s.name}')">▶</button>
                </li>
            `).join('');
        }

        function F_play(url, name) {
            document.getElementById('playerArea').style.display = 'block';
            C_AUDIO.src = url.replace('http://', 'https://');
            document.getElementById('playerLabel').textContent = "Hraje: " + name;
            C_AUDIO.play();
        }
    </script>
</body>
</html>
